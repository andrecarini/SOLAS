<!--
Template: pipeline_complete.html
Purpose: Success message shown after pipeline execution completes
Usage: Load with load_template('pipeline_complete.html')
Variables: None (static template)
-->

<style>
/* Light theme (default) */
:root {
    --color-success: #34a853;
    --color-text-primary: #202124;
    --color-bg-primary: #ffffff;
}

/* Colab dark theme detection */
[theme="dark"] :root,
.theme-dark :root,
html[theme="dark"] :root {
    --color-success: #81c995;
    --color-text-primary: #e8eaed;
    --color-bg-primary: #202124;
}

/* Fallback to prefers-color-scheme if Colab theme not detected */
@media (prefers-color-scheme: dark) {
    :root {
        --color-success: #81c995;
        --color-text-primary: #e8eaed;
        --color-bg-primary: #202124;
    }
}
</style>

<div style="background: color-mix(in srgb, var(--color-success) 20%, var(--color-bg-primary)); 
            border-left: 4px solid var(--color-success); 
            padding: 15px; 
            margin-top: 15px; 
            border-radius: 8px;">
    <p style="color: var(--color-success); margin: 0; font-weight: 600;">
        ✓ Pipeline Complete!
    </p>
    <p style="color: var(--color-text-primary); margin: 5px 0 0 0; font-size: 14px;">
        All stages have completed successfully. Run the <strong>View Results</strong> cell to see the translated transcript, summary, podcast script, and generated audio.
    </p>
</div>
