<!--
Template: pipeline_start.html
Purpose: Information message shown before pipeline execution
Usage: Load with load_template('pipeline_start.html')
Variables: None (static template)
-->

<style>
/* Light theme (default) */
:root {
    --color-info: #1a73e8;
    --color-primary: #1a73e8;
    --color-success: #34a853;
    --color-text-primary: #202124;
    --color-text-secondary: #5f6368;
    --color-bg-primary: #ffffff;
    --color-bg-secondary: #f8f9fa;
}

/* Colab dark theme detection */
[theme="dark"] :root,
.theme-dark :root,
html[theme="dark"] :root {
    --color-info: #8ab4f8;
    --color-primary: #8ab4f8;
    --color-success: #81c995;
    --color-text-primary: #e8eaed;
    --color-text-secondary: #9aa0a6;
    --color-bg-primary: #202124;
    --color-bg-secondary: #292a2d;
}

/* Fallback to prefers-color-scheme if Colab theme not detected */
@media (prefers-color-scheme: dark) {
    :root {
        --color-info: #8ab4f8;
        --color-primary: #8ab4f8;
        --color-success: #81c995;
        --color-text-primary: #e8eaed;
        --color-text-secondary: #9aa0a6;
        --color-bg-primary: #202124;
        --color-bg-secondary: #292a2d;
    }
}
</style>

<div style="background: color-mix(in srgb, var(--color-info) 20%, var(--color-bg-primary)); 
            border-left: 4px solid var(--color-info); 
            padding: 15px; 
            margin-top: 15px; 
            border-radius: 8px;">
    <p style="color: var(--color-info); margin: 0; font-weight: 600;">
        🚀 Pipeline Starting
    </p>
    <p style="color: var(--color-text-primary); margin: 5px 0 0 0; font-size: 14px;">
        The pipeline will transcribe your audio, translate it, generate a summary, create a podcast script, and synthesize the final audio. 
        This may take several minutes depending on audio length and model sizes. Progress will be shown below.
    </p>
</div>
